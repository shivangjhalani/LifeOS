# ═══════════════════════════════════════════════════════════════
#  LiteLLM Proxy — config.yaml
#
#  How to use:
#    1. Uncomment the providers / models you want.
#    2. Set matching API keys in .env (or as env vars).
#    3. Run: docker compose up
#    4. Dashboard: http://localhost:4000/ui
#    5. API:       http://localhost:4000
#
#  model_name is the alias YOUR code uses.
#  model under litellm_params is the actual provider/model.
# ═══════════════════════════════════════════════════════════════

