# ── Router settings ──────────────────────────────────────────
# Governs retry / fallback / load-balancing when you register
# multiple deployments under the SAME model_name.
router_settings:
  routing_strategy: simple-shuffle     # options: simple-shuffle, least-busy, usage-based-routing, latency-based-routing
  num_retries: 2
  timeout: 60                          # seconds per request
  # fallbacks:                         # ordered fallback chain
  #   - gpt-4o: [claude-sonnet]
  #   - claude-sonnet: [gemini-pro]


# ── LiteLLM module settings ─────────────────────────────────
litellm_settings:
  drop_params: true                    # silently drop params a provider doesn't support
  set_verbose: false                   # flip to true for debugging
  request_timeout: 120
  # success_callback: ["langfuse"]     # uncomment to send logs to Langfuse, etc.
  # cache: true                        # enable in-memory response caching
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379


# ── General / server settings ───────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true              # lets you add/edit models via the dashboard UI
  # alerting: ["slack"]                # uncomment + set SLACK_WEBHOOK_URL for alerts
